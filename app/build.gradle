plugins {
    id 'com.android.application'
}

android {
    namespace 'com.chinatelecom.yizhishilian'
    compileSdk 33
    ndkVersion "29.0.14206865" 

    defaultConfig {
        applicationId "com.chinatelecom.yizhishilian"
        archivesBaseName = "$applicationId"

        minSdkVersion 24
        targetSdkVersion 35

        externalNativeBuild {
            cmake {
                arguments "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path file('src/main/jni/CMakeLists.txt')
        }
    }

    dependencies {
        implementation 'com.android.support:support-v4:24.0.0'
    }

    packaging {
        jniLibs {
            useLegacyPackaging true
        }
    }

    // lint-vital 在 release 构建里偶发内部错误（lint 本身无问题），跳过它以保证 release 可重复构建
    lint {
        checkReleaseBuilds false
    }
}
